<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assessment Result</title>
<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#14252c,#203a43,#2c5364);
    color:white;
}
.header{
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}
.container{
    max-width:900px;
    margin:30px auto;
    padding:20px;
}
.cards{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}
.card{
    background: rgba(35, 33, 33, 0.08);
    padding:20px;
    border-radius:12px;
    cursor:pointer;
}
.label{ font-size:14px; color:#aaa; }
.value{ font-size:22px; margin-top:5px; font-weight:bold; }

.status{
    text-align:center;
    margin-top:30px;
    font-size:22px;
    font-weight:bold;
    color:#00ffcc;
}

.performance-bar-container{ margin-top:40px; }
.performance-bar{
    height:35px;
    width:100%;
    background:#333;
    border-radius:10px;
    display:flex;
    overflow:hidden;
}
.performance-segment{
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    color:#000;
    transition: width 1s;
}
.bar-correct{ background:#00ffcc; }
.bar-wrong{ background:#ff4c4c; }
.bar-notAttempted{ background:#ffaa00; }

/* Leaderboard */
.leaderboard{
    margin-top:50px;
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:10px;
}
.leaderboard-item{
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    background:rgba(255,255,255,0.05);
}
.leaderboard-item.top{
    background:rgba(0,255,204,0.2);
}
.small-text{
    font-size:12px;
    color:#aaa;
}

/* Wrong Answer Section */
#wrongSection{
    display:none;
    margin-top:40px;
}
.wrong-card{
    background:rgba(255,0,0,0.1);
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

/* Feedback */
.feedback{
    margin-top:50px;
    text-align:center;
}
.feedback textarea{
    width:80%;
    padding:10px;
    border-radius:8px;
    border:none;
    height:100px;
}
.btn{
    margin-top:15px;
    padding:10px 25px;
    border:none;
    border-radius:8px;
    background:#00ffcc;
    cursor:pointer;
    font-weight:bold;
}
.btn:hover{
    background:#00ccaa;
}
.success-msg{
    margin-top:10px;
    color:#5eff00;
}
#backBtn{
    display:none;
}
</style>
</head>
<body>

<div class="header">Assessment Result</div>

<div class="container">

<div class="cards">
<div class="card">
<div class="label">Student Name</div>
<div class="value" id="studentName">Student</div>
</div>

<div class="card">
<div class="label">Correct Answers</div>
<div class="value" id="correct">0</div>
</div>

<div class="card" onclick="showWrongAnswers()">
<div class="label">Wrong Answers (Click to Review)</div>
<div class="value" id="wrong">0</div>
</div>

<div class="card">
<div class="label">Not Attempted</div>
<div class="value" id="notAttempted">0</div>
</div>

<div class="card">
<div class="label">Accuracy</div>
<div class="value" id="accuracy">0%</div>
</div>
</div>

<div class="performance-bar-container">
<div style="margin-bottom:8px;">Performance Overview</div>
<div class="performance-bar">
<div id="barCorrect" class="performance-segment bar-correct" style="width:0%">0%</div>
<div id="barWrong" class="performance-segment bar-wrong" style="width:0%">0%</div>
<div id="barNotAttempted" class="performance-segment bar-notAttempted" style="width:0%">0%</div>
</div>
</div>

<div class="status" id="status">Performance</div>

<!-- Wrong Answer Review -->
<div id="wrongSection">
<h3>Wrong Answers Review</h3>
<div id="wrongList"></div>
</div>

<!-- Leaderboard -->
<div class="leaderboard">
<h2 style="text-align:center;">🏆 Top 10 Highest Scores</h2>
<div id="leaderboardList"></div>
</div>

<!-- Feedback Section -->
<div class="feedback">
<h3>Submit Your Feedback</h3>
<textarea id="feedbackInput" placeholder="Write your feedback here..."></textarea><br>
<button class="btn" id="submitFeedbackBtn" onclick="submitFeedback()">Submit Feedback</button>
<div id="feedbackMsg" class="success-msg"></div>
<br>
<button id="backBtn" class="btn" onclick="goHome()">Back To Home</button>
</div>

</div>

<script>

// Get stored values
let name = localStorage.getItem("studentName") || "Student";
let score = parseInt(localStorage.getItem("score")) || 0;
let answers = JSON.parse(localStorage.getItem("answers")) || [];

let notAttempted = answers.filter(a => a.selected === "No Answer").length;
let wrong = answers.filter(a => a.selected !== a.correct && a.selected !== "No Answer").length;
let correct = score;
let total = answers.length;
let accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;

// Update UI
document.getElementById("studentName").innerText = name;
document.getElementById("correct").innerText = correct;
document.getElementById("wrong").innerText = wrong;
document.getElementById("notAttempted").innerText = notAttempted;
document.getElementById("accuracy").innerText = accuracy + "%";

// Performance message
let statusMsg = "Needs Improvement";
if(correct >= 10) statusMsg = "Excellent Performance 🔥";
else if(correct >= 7) statusMsg = "Good Performance 👍";
document.getElementById("status").innerText = statusMsg;

// Bar animation
let correctPercent = total>0 ? Math.round((correct/total)*100) : 0;
let wrongPercent = total>0 ? Math.round((wrong/total)*100) : 0;
let notAttemptedPercent = total>0 ? 100 - correctPercent - wrongPercent : 0;

setTimeout(()=>{
document.getElementById("barCorrect").style.width = correctPercent + "%";
document.getElementById("barCorrect").innerText = correctPercent + "%";

document.getElementById("barWrong").style.width = wrongPercent + "%";
document.getElementById("barWrong").innerText = wrongPercent + "%";

document.getElementById("barNotAttempted").style.width = notAttemptedPercent + "%";
document.getElementById("barNotAttempted").innerText = notAttemptedPercent + "%";
},200);

// ================= Wrong Answer Review =================
function showWrongAnswers(){
let wrongSection = document.getElementById("wrongSection");
let wrongList = document.getElementById("wrongList");
wrongList.innerHTML = "";

let wrongAnswers = answers.filter(a => a.selected !== a.correct && a.selected !== "No Answer");

if(wrongAnswers.length === 0){
wrongList.innerHTML = "<p style='color:#00ffcc;'>No wrong answers 🎉</p>";
} else {
wrongAnswers.forEach((q)=>{
let div = document.createElement("div");
div.className = "wrong-card";
div.innerHTML = `
<p><strong>Question:</strong> ${q.question}</p>
<p style="color:#ff6666;">Your Answer: ${q.selected}</p>
<p style="color:#5eff00;">Correct Answer: ${q.correct}</p>
<p><strong>Explanation:</strong> ${q.explanation || "No explanation provided."}</p>
`;
wrongList.appendChild(div);
});
}
wrongSection.style.display = "block";
}

// ================= Leaderboard =================
let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];
leaderboard = leaderboard.filter(player => player.name !== name);
leaderboard.push({name:name,score:correct,accuracy:accuracy,dateTime:new Date().toLocaleString()});
leaderboard.sort((a,b)=> b.score - a.score);
leaderboard = leaderboard.slice(0,10);
localStorage.setItem("leaderboard", JSON.stringify(leaderboard));

let leaderboardDiv = document.getElementById("leaderboardList");
leaderboardDiv.innerHTML = "";
leaderboard.forEach((player,index)=>{
let div = document.createElement("div");
div.className = "leaderboard-item";
if(index===0) div.classList.add("top");
div.innerHTML = `
<strong>#${index+1} ${player.name}</strong><br>
Score: ${player.score} | ${player.accuracy}%<br>
<span class="small-text">📅 ${player.dateTime}</span>
`;
leaderboardDiv.appendChild(div);
});

// ================= Feedback =================
function submitFeedback(){
let msg = document.getElementById("feedbackInput").value.trim();
if(msg===""){ alert("Please enter feedback"); return; }

// Save feedback
let allFeedback = JSON.parse(localStorage.getItem("feedback")) || [];
allFeedback.push({name:name,message:msg,date:new Date().toLocaleString()});
localStorage.setItem("feedback",JSON.stringify(allFeedback));

// Lock textarea & button
document.getElementById("feedbackInput").readOnly = true;
document.getElementById("submitFeedbackBtn").disabled = true;
document.getElementById("feedbackMsg").innerText="Thank you for your feedback ✅";

// Show back to home
document.getElementById("backBtn").style.display="inline-block";
}

function goHome(){
window.location.href="admin.html";
}

</script>

</body>
</html>
